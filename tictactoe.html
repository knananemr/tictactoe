<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic-Tac-Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #e94560;
      height: 30px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #00b4d8; }
    .cell.win { background: #0f3460; }

    #restart {
      margin-top: 25px;
      padding: 12px 30px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 40px;
      margin-bottom: 20px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #00b4d8; }
  </style>
</head>
<body>

  <h1>Tic-Tac-Toe</h1>

  <div id="score">
    <div class="score-box x-score">X <span id="scoreX">0</span></div>
    <div class="score-box">Draws <span id="scoreDraw">0</span></div>
    <div class="score-box o-score">O <span id="scoreO">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('scoreX');
    const scoreO = document.getElementById('scoreO');
    const scoreDraw = document.getElementById('scoreDraw');

    let board = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, D: 0 };

    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = cell.dataset.i;
        if (gameOver || board[i]) return;
        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const winLine = getWinner();
        if (winLine) {
          winLine.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `Player ${current} wins!`;
          scores[current]++;
          updateScore();
          gameOver = true;
        } else if (board.every(c => c)) {
          status.textContent = "It's a draw!";
          scores.D++;
          updateScore();
          gameOver = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    function getWinner() {
      for (const line of wins) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function updateScore() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', () => {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    });
  </script>

</body>
</html>
